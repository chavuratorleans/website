<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chavurat Or'Leans — New Orleans Community Shabbat</title>
  <meta name="description" content="Chavurat Or'Leans is a welcoming, kid-forward New Orleans community Shabbat. Good coffee, great people, joyful services, and a delicious lunch. All are welcome.">
  <meta property="og:title" content="Chavurat Or'Leans">
  <meta property="og:description" content="We were expecting you! A welcoming, kid-forward New Orleans community Shabbat.">
  <meta property="og:image" content="https://chavuratorleans.netlify.app/images/logo.png">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-logo">Chavurat Or'Leans</a>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="donate.html">Donations</a></li>
        <li><a href="join.html">Join Our Contact List</a></li>
      </ul>
    </div>
  </nav>

  <!-- Tagline Banner -->
  <div class="tagline-banner">
    <p class="tagline-text" data-content="tagline"></p>
    <span class="tagline-accent"></span>
  </div>

  <!-- Hero: Logo left, welcome text right -->
  <header class="hero">
    <div class="hero-inner">
      <img src="images/logo.png" alt="Chavurat Or'Leans logo" class="hero-logo">
      <div class="hero-text">
        <h1 data-content="welcome_heading"></h1>
        <p data-content="welcome_text"></p>
      </div>
    </div>
  </header>

  <!-- Events Band: Flyer + Schedule (2-column) -->
  <section class="events-band fade-in">
    <div class="events-band-inner">
      <div class="events-flyer">
        <img src="images/seasonal-flyer.png" data-content-attr="seasonal_alt" alt="Save the Date — Spring 2026">
      </div>
      <div class="events-schedule">
        <h2 data-content="schedule_heading"></h2>
        <ul>
          <li data-repeat="schedule_items" style="display:none">
            <span data-field="item"></span>
          </li>
        </ul>
        <p class="schedule-note" data-content="schedule_note"></p>
        <a href="https://drive.google.com/drive/u/1/folders/15IbhDkBsScuVq5nX2a6BMN3Dsb9VVqYy" class="resource-link" target="_blank" rel="noopener">&#128214; Divrei Torah Archive</a>
      </div>
    </div>
  </section>

  <!-- Values -->
  <section class="values">
    <div class="container">
      <h2>Our Values</h2>
      <div class="values-grid fade-in-stagger">
        <div class="value-card" data-repeat="values" style="display:none">
          <span class="value-hebrew" data-field="hebrew"></span>
          <h3 data-field="title"></h3>
          <p data-field="text"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- More — Pull Quote -->
  <section class="more fade-in">
    <div class="container">
      <h2 data-content="more_headline"></h2>
      <p data-content="more_text"></p>
    </div>
  </section>

  <!-- CTA -->
  <section class="cta fade-in">
    <h2>Come Celebrate Shabbat With Us</h2>
    <div class="cta-buttons">
      <a href="join.html" class="btn-primary">Join Our Contact List</a>
      <a href="donate.html" class="btn-secondary">Support Our Community</a>
    </div>
  </section>

  <!-- FAQ -->
  <section class="faq fade-in">
    <h2>Frequently Asked Questions</h2>
    <div class="faq-list">
      <div class="faq-item" data-repeat="faqs" style="display:none">
        <button class="faq-question" data-field="question"></button>
        <div class="faq-answer">
          <p data-field="answer"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p class="footer-email">
      <a href="mailto:chavuratorleans@gmail.com" data-content="email"></a>
    </p>
    <p data-content="footer_text"></p>
    <p class="footer-copyright">&copy; 2026 Chavurat Or'Leans</p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <script src="js/content-loader.js"></script>
  <script>initContent('content/site.yml', 'content/home.yml');</script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
  <script>
    // Hamburger toggle
    document.querySelector('.nav-toggle').addEventListener('click', function() {
      this.classList.toggle('open');
      document.querySelector('.nav-links').classList.toggle('open');
    });
    // FAQ accordion — opening one closes the others
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('.faq-question');
      if (btn) {
        var item = btn.parentElement;
        var wasOpen = item.classList.contains('open');
        document.querySelectorAll('.faq-item.open').forEach(function(el) {
          el.classList.remove('open');
        });
        if (!wasOpen) item.classList.add('open');
      }
    });
    // Intersection observer for fade-in animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in, .fade-in-stagger').forEach(el => observer.observe(el));
  </script>

</body>
</html>
