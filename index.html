<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chavurat Or'Leans — New Orleans Community Shabbat</title>
  <meta name="description" content="Chavurat Or'Leans is a welcoming, kid-forward New Orleans community Shabbat. Good coffee, great people, joyful services, and a delicious lunch. All are welcome.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-logo">
        <img src="images/logo-banner.png" alt="Chavurat Or'Leans">
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="donate.html">Donations</a></li>
        <li><a href="join.html">Join Our Contact List</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero -->
  <header class="hero">
    <img src="images/logo.png" alt="Chavurat Or'Leans logo" class="hero-logo">
    <p class="hero-tagline" data-content="tagline"></p>
  </header>

  <!-- Welcome -->
  <section class="welcome fade-in">
    <h2 data-content="welcome_heading"></h2>
    <p data-content="welcome_text"></p>
  </section>

  <!-- Values -->
  <section class="values">
    <div class="container">
      <h2>Our Values</h2>
      <div class="values-grid fade-in-stagger">
        <div class="value-card" data-repeat="values" style="display:none">
          <h3 data-field="title"></h3>
          <p data-field="text"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- More -->
  <section class="more fade-in">
    <div class="container">
      <p data-content="more_text"></p>
    </div>
  </section>

  <!-- Schedule -->
  <section class="schedule fade-in">
    <div class="schedule-inner">
      <h2 data-content="schedule_heading"></h2>
      <ul>
        <li data-repeat="schedule_items" style="display:none">
          <span data-field="item"></span>
        </li>
      </ul>
      <p class="schedule-note" data-content="schedule_note"></p>
    </div>
  </section>

  <!-- Calendar -->
  <section class="calendar-section">
    <h2>Upcoming Events</h2>
    <div class="calendar-container">
      <iframe src="https://calendar.google.com/calendar/embed?src=chavuratorleans%40gmail.com&ctz=America%2FChicago"
              width="100%" height="400" frameborder="0" scrolling="no"></iframe>
    </div>
  </section>

  <!-- CTA -->
  <section class="cta fade-in">
    <h2>Come Celebrate Shabbat With Us</h2>
    <div class="cta-buttons">
      <a href="join.html" class="btn-primary">Join Our Contact List</a>
      <a href="donate.html" class="btn-secondary">Support Our Community</a>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p class="footer-email">
      <a href="mailto:chavuratorleans@gmail.com" data-content="email"></a>
    </p>
    <p class="footer-copyright" data-content="footer_text"></p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <script src="js/content-loader.js"></script>
  <script>initContent('content/site.yml', 'content/home.yml');</script>
  <script>
    // Hamburger toggle
    document.querySelector('.nav-toggle').addEventListener('click', function() {
      this.classList.toggle('open');
      document.querySelector('.nav-links').classList.toggle('open');
    });
    // Intersection observer for fade-in animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in, .fade-in-stagger').forEach(el => observer.observe(el));
  </script>

</body>
</html>
