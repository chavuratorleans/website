tagline: "We were expecting you!"
welcome_heading: "Welcome to Chavurat Or'Leans!"
welcome_text: "Good coffee, great people, joyful services, and a delicious lunch. Our Chavurah is explicitly welcoming of queer, interfaith, & racially diverse families, & individuals of all ages & identities. We're excited to spend Shabbat together!"
seasonal_image: "images/seasonal-flyer.png"
seasonal_alt: "Spring 2026 Save the Date"
values:
  - hebrew: "יְלָדִים"
    title: "We are kid forward"
    text: "We create kid-facing opportunities and celebrate the inclusion of kids in all spaces. We welcome the noise, creativity, and unpredictability that children bring."
  - hebrew: "כֻּלָּם"
    title: "We are for everyone"
    text: "We are a safe and explicitly welcoming space for all who are interested in joining us, including interfaith, racially diverse, and LGBTQ+ families and individuals of all identities and ages."
  - hebrew: "בַּיִת"
    title: "We are a welcoming home"
    text: "\"We were expecting you.\" We anticipate everyone's arrival with warmth and joy. Whether it is your first time or you regularly join us, this community exists for you and because of you."
  - hebrew: "מָסֹרֶת"
    title: "We are rooted in tradition"
    text: "We are multi-denominational. We embrace varying levels of observance and welcome community members to share their traditions. We offer opportunities to practice traditional prayer and ritual, while cultivating ruach (spirit) and kavana (intention)."
more_headline: "\"The more, the more.\""
more_text: "Our offerings add to the robustness, depth, and fullness of Jewish life in New Orleans. We honor the importance of synagogues and clergy, and present opportunities to enhance participation and sense of belonging across our greater Jewish community."
schedule_heading: "Join Us for Shabbat"
schedule_items:
  - "1st Shabbat of the month at Touro Synagogue"
  - "Other Shabbatot in members' homes"
schedule_note: "Please sign up for our listserv to find out details and locations of upcoming events."
divrei_torah_link: "https://drive.google.com/drive/u/1/folders/15IbhDkBsScuVq5nX2a6BMN3Dsb9VVqYy"
faqs:
  - question: "What is a Chavurah?"
    answer: "A group of friends who gather together for prayer. You're invited!"
  - question: "Why a Community Chavurah?"
    answer: "To meet the evolving needs of New Orleanians in creating intentional and regular Jewish practice. To share Shabbat traditions and to develop new ones, in a welcoming, vibrant community."
  - question: "How can I participate?"
    answer: "Most importantly, just show up! Lead prayers, read Torah, or take another role in the service. <a href='join.html'>Sign up here</a> or contact <a href='mailto:chavuratorleans@gmail.com'>Mia Bagneris or Ben Horwitz</a>. Help schlep, set up, or clean up! <a href='join.html'>Sign up here</a> or contact <a href='mailto:chavuratorleans@gmail.com'>Mia Bagneris or Ben Horwitz</a>."
  - question: "What if I'd like to participate in services, but don't feel ready?"
    answer: "Chavurat Or'Leans is for everyone at all levels of participation! We are happy to help you brush up on your skills or start from scratch with reading Torah, leading prayers, giving a d'var torah, etc. Contact <a href='mailto:chavuratorleans@gmail.com'>Mia Bagneris or Ben Horwitz</a>."
  - question: "Do I need to bring anything?"
    answer: "Come as you are! We provide prayer books, but no other personal ritual items."
  - question: "What kind of practice are the Shabbat services?"
    answer: "Think an egalitarian service rooted in tradition with a focus on ruach-filled davening (joyful prayers)."
  - question: "Who is this for?"
    answer: "This is for you! We enthusiastically welcome all who are interested in joining us, including individuals of all identities and ages, interfaith families, racially diverse families, and LGBTQ+ individuals and families."
  - question: "Will there be food?"
    answer: "Of course! Coffee and snacks are always available on Shabbat morning, and we come together for lunch after the service."
  - question: "Is the food kosher?"
    answer: "We make an effort to ensure that the main dish (usually bagels and cream cheese) are hechshered. There is also food prepared in a non-kosher kitchen, but it is usually cold salad and fruit. Contact <a href='mailto:chavuratorleans@gmail.com'>Ellie Streiffer</a> for specifics."
  - question: "Are the services and activities Shomer Shabbat?"
    answer: "Not entirely, but we make an effort. Instruments are not used in the main service, but they are on occasion for the kids. We are intentional about finding kids activities that are friendly for all families that might attend. If an activity is not Shomer Shabbat, there will always be another option that is. Contact <a href='mailto:chavuratorleans@gmail.com'>Ellie Streiffer</a> for specifics."
  - question: "Is there a cost?"
    answer: "No, just your intention and time. Want to contribute? <a href='donate.html'>Click here to make a donation!</a>"
  - question: "Who is organizing Chavurat Or'Leans?"
    answer: "The central planning team is Jessica Arnold, Mia Bagneris, Ben Horwitz, Leah Krandel, and Ellie Streiffer. There are a ton of ways to get involved!"
  - question: "Are you part of the Keshet Equality Directory?"
    answer: "Why yes, we are, thank you for asking! Because we were founded on and are guided by the principle of radical inclusion."
